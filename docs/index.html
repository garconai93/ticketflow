                    </form>
                `;
                document.getElementById('modalTitle').textContent = 'Create Ticket';
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('modalFooter').innerHTML = '<button class="btn btn-secondary" onclick="App.closeModal()">Cancel</button><button class="btn btn-primary" onclick="App.createTicketFromModal()">Create</button>';
                document.getElementById('modalOverlay').classList.add('active');
            },

            toggleTagSelection(tagId) {
                const input = document.getElementById('selectedTagsCreate');
                let tags = input.value ? input.value.split(',') : [];
                const picker = document.getElementById('tagPickerCreate');
                const selectedList = document.getElementById('tagSelectedCreate');
                if (tags.includes(tagId)) {
                    tags = tags.filter(t => t !== tagId);
                    picker.querySelector(`[data-tag="${tagId}"]`).classList.remove('selected');
                } else {
                    tags.push(tagId);
                    picker.querySelector(`[data-tag="${tagId}"]`).classList.add('selected');
                }
                input.value = tags.join(',');
                const tagInfo = AVAILABLE_TAGS.find(t => t.id === tagId);
                selectedList.innerHTML = tags.map(tid => {
                    const ti = AVAILABLE_TAGS.find(x => x.id === tid);
                    return `<span class="tag tag-${tid}">${ti.label}<span class="tag-remove" onclick="App.removeTag('${tid}', 'Create')">×</span></span>`;
                }).join('');
            },

            removeTag(tagId, suffix) {
                const input = document.getElementById('selectedTags' + suffix);
                let tags = input.value ? input.value.split(',') : [];
                tags = tags.filter(t => t !== tagId);
                input.value = tags.join(',');
                const picker = document.getElementById('tagPicker' + suffix);
                if (picker) picker.querySelector(`[data-tag="${tagId}"]`)?.classList.remove('selected');
                const selectedList = document.getElementById('tagSelected' + suffix);
                selectedList.innerHTML = tags.map(tid => {
                    const ti = AVAILABLE_TAGS.find(x => x.id === tid);
                    return `<span class="tag tag-${tid}">${ti.label}<span class="tag-remove" onclick="App.removeTag('${tid}', '${suffix}')">×</span></span>`;
                }).join('');
            },

            createTicketFromModal() {
                const title = document.getElementById('ticketTitle').value;
                const description = document.getElementById('ticketDesc').value;
                const priority = document.getElementById('ticketPriority').value;
                const category = document.getElementById('ticketCategory').value;
                const assigneeId = document.getElementById('ticketAssignee').value;
                const status = document.getElementById('ticketStatus').value;
                const tagsVal = document.getElementById('selectedTagsCreate').value;
                const tags = tagsVal ? tagsVal.split(',').filter(t => t) : [];
                if (!title || !description) { this.showToast('Please fill all fields', 'error'); return; }
                const ticket = {
                    id: 't' + Date.now(),
                    ticketNumber: 'TF-' + String(this.ticketCounter).padStart(4, '0'),
                    title, description, priority, category, status,
                    assigneeId: assigneeId || null,
                    reporterId: this.currentUser.id,
                    tags,
                    attachments: [],
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                this.tickets.push(ticket);
                this.ticketCounter++;
                this.addActivity(ticket.id, 'created', {});
                if (assigneeId) {
                    this.notifications.push({
                        id: 'n' + Date.now(), userId: assigneeId, type: 'assigned',
                        title: 'Ticket Assigned', message: `You have been assigned to ${ticket.ticketNumber}`, ticketId: ticket.id, read: false, createdAt: new Date().toISOString()
                    });
                }
                this.saveData();
                this.closeModal();
                this.showToast('Ticket created successfully', 'success');
                this.navigate(window.location.hash.replace('#/', ''));
            },

            viewTicket(id) {
                const ticket = this.tickets.find(t => t.id === id);
                if (!ticket) return;
                const assignee = this.users.find(u => u.id === ticket.assigneeId);
                const reporter = this.users.find(u => u.id === ticket.reporterId);
                const comments = this.comments.filter(c => c.ticketId === id);
                const tagHtml = ticket.tags.map(tag => {
                    const ti = AVAILABLE_TAGS.find(t => t.id === tag);
                    return `<span class="tag tag-${tag}">${ti ? ti.label : tag}</span>`;
                }).join('');
                const ticketComments = comments.map(c => {
                    const author = this.users.find(u => u.id === c.authorId);
                    return `<div class="comment">
                        <div class="comment-avatar">${author?.name.charAt(0) || '?'}</div>
                        <div class="comment-content">
                            <div class="comment-header"><span class="comment-author">${author?.name || 'Unknown'}</span><span class="comment-time">${this.formatDate(c.createdAt)}</span></div>
                            <div class="comment-body">${c.content}</div>
                        </div>
                    </div>`;
                }).join('');
                const activities = this.activity.filter(a => a.ticketId === id).map(a => {
                    const user = this.users.find(u => u.id === a.userId);
                    return `<div class="activity-item">
                        <div class="activity-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></div>
                        <div class="activity-content"><div class="activity-text"><strong>${user?.name || 'Unknown'}</strong> ${a.action.replace('_', ' ')}</div><div class="activity-time">${this.formatDate(a.createdAt)}</div></div>
                    </div>`;
                }).join('');
                document.getElementById('modalTitle').textContent = 'Ticket Details';
                document.getElementById('modalBody').innerHTML = `
                    <div class="ticket-detail-header">
                        <div class="ticket-detail-title">${ticket.title}</div>
                        <div class="ticket-detail-meta">
                            <span class="ticket-detail-id">${ticket.ticketNumber}</span>
                            <span class="badge badge-${ticket.status}">${ticket.status.replace('_', ' ')}</span>
                            <span class="badge badge-${ticket.priority}">${ticket.priority}</span>
                            <span>${ticket.category}</span>
                        </div>
                    </div>
                    ${ticket.tags.length ? `<div class="ticket-tags-section"><h3>Tags</h3><div class="ticket-tags">${tagHtml}</div></div>` : ''}
                    <div class="ticket-description"><h3>Description</h3><p>${ticket.description}</p></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
                        <div><strong>Assignee:</strong> ${assignee?.name || 'Unassigned'}</div>
                        <div><strong>Reporter:</strong> ${reporter?.name || 'Unknown'}</div>
                    </div>
                    <div class="comments-section">
                        <h3>Comments</h3>
                        ${ticketComments || '<p style="color:var(--text-secondary)">No comments yet.</p>'}
                        <div class="comment-input-wrapper">
                            <textarea class="comment-input" id="newComment" placeholder="Add a comment..."></textarea>
                        </div>
                    </div>
                    ${activities ? `<div style="margin-top:24px"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px">Activity</h3>${activities}</div>` : ''}
                `;
                document.getElementById('modalFooter').innerHTML = `<button class="btn btn-secondary" onclick="App.closeModal()">Close</button><button class="btn btn-primary" onclick="App.addComment('${id}')">Add Comment</button>`;
                document.getElementById('modalOverlay').classList.add('active');
            },

            addComment(ticketId) {
                const content = document.getElementById('newComment').value.trim();
                if (!content) { this.showToast('Please enter a comment', 'error'); return; }
                this.comments.push({ id: 'c' + Date.now(), ticketId, authorId: this.currentUser.id, content, createdAt: new Date().toISOString() });
                this.addActivity(ticketId, 'commented', {});
                this.saveData();
                this.showToast('Comment added', 'success');
                this.viewTicket(ticketId);
            },

            showCreateUserModal() {
                document.getElementById('modalTitle').textContent = 'Add User';
                document.getElementById('modalBody').innerHTML = `
                    <div class="form-group"><label>Name</label><input type="text" id="newUserName" required style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="newUserEmail" required style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="newUserPassword" required style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"></div>
                    <div class="form-group"><label>Role</label><select id="newUserRole" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"><option value="agent">Agent</option><option value="admin">Admin</option><option value="viewer">Viewer</option></select></div>
                `;
                document.getElementById('modalFooter').innerHTML = '<button class="btn btn-secondary" onclick="App.closeModal()">Cancel</button><button class="btn btn-primary" onclick="App.createUser()">Create</button>';
                document.getElementById('modalOverlay').classList.add('active');
            },

            createUser() {
                const name = document.getElementById('newUserName').value;
                const email = document.getElementById('newUserEmail').value;
                const password = document.getElementById('newUserPassword').value;
                const role = document.getElementById('newUserRole').value;
                if (!name || !email || !password) { this.showToast('Please fill all fields', 'error'); return; }
                if (this.users.find(u => u.email === email)) { this.showToast('Email already exists', 'error'); return; }
                this.users.push({ id: 'u' + Date.now(), email, passwordHash: password, name, role, createdAt: new Date().toISOString(), lastActive: null });
                this.saveData();
                this.closeModal();
                this.showToast('User created', 'success');
                this.navigate('users');
            },

            showEditUserModal(id) {
                const user = this.users.find(u => u.id === id);
                if (!user) return;
                document.getElementById('modalTitle').textContent = 'Edit User';
                document.getElementById('modalBody').innerHTML = `
                    <div class="form-group"><label>Name</label><input type="text" id="editUserName" value="${user.name}" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"></div>
                    <div class="form-group"><label>Role</label><select id="editUserRole" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"><option value="agent" ${user.role==='agent'?'selected':''}>Agent</option><option value="admin" ${user.role==='admin'?'selected':''}>Admin</option><option value="viewer" ${user.role==='viewer'?'selected':''}>Viewer</option></select></div>
                `;
                document.getElementById('modalFooter').innerHTML = `<button class="btn btn-secondary" onclick="App.closeModal()">Cancel</button><button class="btn btn-primary" onclick="App.updateUser('${id}')">Save</button>`;
                document.getElementById('modalOverlay').classList.add('active');
            },

            updateUser(id) {
                const user = this.users.find(u => u.id === id);
                if (!user) return;
                user.name = document.getElementById('editUserName').value;
                user.role = document.getElementById('editUserRole').value;
                this.saveData();
                this.closeModal();
                this.showToast('User updated', 'success');
                this.navigate('users');
            },

            deleteUser(id) {
                if (!confirm('Delete this user?')) return;
                this.users = this.users.filter(u => u.id !== id);
                this.saveData();
                this.showToast('User deleted', 'success');
                this.navigate('users');
            },

            showEditTicketModal(id) {
                const ticket = this.tickets.find(t => t.id === id);
                if (!ticket) return;
                const tagOptionsHtml = AVAILABLE_TAGS.map(t => {
                    const isSelected = ticket.tags.includes(t.id);
                    return `<span class="tag-option tag-${t.id} ${isSelected ? 'selected' : ''}" data-tag="${t.id}" onclick="App.toggleTagSelectionEdit('${t.id}')" style="background:${t.color}">${t.label}</span>`;
                }).join('');
                const selectedTagsHtml = ticket.tags.map(tid => {
                    const ti = AVAILABLE_TAGS.find(x => x.id === tid);
                    return `<span class="tag tag-${tid}">${ti ? ti.label : tid}<span class="tag-remove" onclick="App.removeTagEdit('${tid}')">×</span></span>`;
                }).join('');
                document.getElementById('modalTitle').textContent = 'Edit Ticket';
                document.getElementById('modalBody').innerHTML = `
                    <div class="form-group"><label>Title</label><input type="text" id="editTicketTitle" value="${ticket.title}" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"></div>
                    <div class="form-group"><label>Description</label><textarea id="editTicketDesc" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;min-height:80px;background:var(--bg-primary);color:var(--text-primary)">${ticket.description}</textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>Priority</label><select id="editTicketPriority" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)">${this.priorities.map(p => `<option value="${p.id}" ${ticket.priority===p.id?'selected':''}>${p.label}</option>`).join('')}</select></div>
                        <div class="form-group"><label>Status</label><select id="editTicketStatus" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)"><option value="backlog" ${ticket.status==='backlog'?'selected':''}>Backlog</option><option value="open" ${ticket.status==='open'?'selected':''}>Open</option><option value="in_progress" ${ticket.status==='in_progress'?'selected':''}>In Progress</option><option value="review" ${ticket.status==='review'?'selected':''}>Review</option><option value="resolved" ${ticket.status==='resolved'?'selected':''}>Resolved</option></select></div>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="editTicketCategory" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg-primary);color:var(--text-primary)">
                            ${this.categories.map(c => `<option value="${c}" ${ticket.category===c?'selected':''}>${c}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tags</label>
                        <div class="tag-picker" id="tagPickerEdit">${tagOptionsHtml}</div>
                        <div class="tag-selected-list" id="tagSelectedEdit">${selectedTagsHtml}</div>
                    </div>
                `;
                document.getElementById('modalFooter').innerHTML = `<button class="btn btn-secondary" onclick="App.closeModal()">Cancel</button><button class="btn btn-primary" onclick="App.updateTicket('${id}')">Save</button>`;
                document.getElementById('modalOverlay').classList.add('active');
            },

            toggleTagSelectionEdit(tagId) {
                const picker = document.getElementById('tagPickerEdit');
                const selectedList = document.getElementById('tagSelectedEdit');
                const option = picker.querySelector(`[data-tag="${tagId}"]`);
                const isSelected = option.classList.contains('selected');
                if (isSelected) {
                    option.classList.remove('selected');
                } else {
                    option.classList.add('selected');
                }
                const tagInfo = AVAILABLE_TAGS.find(t => t.id === tagId);
                const allSelected = Array.from(picker.querySelectorAll('.tag-option.selected')).map(el => el.dataset.tag);
                selectedList.innerHTML = allSelected.map(tid => {
                    const ti = AVAILABLE_TAGS.find(x => x.id === tid);
                    return `<span class="tag tag-${tid}">${ti ? ti.label : tid}<span class="tag-remove" onclick="App.removeTagEdit('${tid}')">×</span></span>`;
                }).join('');
            },

            removeTagEdit(tagId) {
                const picker = document.getElementById('tagPickerEdit');
                const selectedList = document.getElementById('tagSelectedEdit');
                picker.querySelector(`[data-tag="${tagId}"]`)?.classList.remove('selected');
                const allSelected = Array.from(picker.querySelectorAll('.tag-option.selected')).map(el => el.dataset.tag);
                selectedList.innerHTML = allSelected.map(tid => {
                    const ti = AVAILABLE_TAGS.find(x => x.id === tid);
                    return `<span class="tag tag-${tid}">${ti ? ti.label : tid}<span class="tag-remove" onclick="App.removeTagEdit('${tid}')">×</span></span>`;
                }).join('');
            },

            updateTicket(id) {
                const ticket = this.tickets.find(t => t.id === id);
                if (!ticket) return;
                ticket.title = document.getElementById('editTicketTitle').value;
                ticket.description = document.getElementById('editTicketDesc').value;
                ticket.priority = document.getElementById('editTicketPriority').value;
                ticket.status = document.getElementById('editTicketStatus').value;
                ticket.category = document.getElementById('editTicketCategory').value;
                const picker = document.getElementById('tagPickerEdit');
                ticket.tags = Array.from(picker.querySelectorAll('.tag-option.selected')).map(el => el.dataset.tag);
                ticket.updatedAt = new Date().toISOString();
                this.addActivity(id, 'updated', {});
                this.saveData();
                this.closeModal();
                this.showToast('Ticket updated', 'success');
                this.navigate(window.location.hash.replace('#/', ''));
            },

            closeModal() { document.getElementById('modalOverlay').classList.remove('active'); },

            // Notifications
            toggleNotifications() {
                const panel = document.getElementById('notificationsPanel');
                panel.classList.toggle('active');
                if (panel.classList.contains('active')) this.renderNotifications();
            },

            renderNotifications() {
                const userNotifications = this.notifications.filter(n => n.userId === this.currentUser.id);
                document.getElementById('notificationsList').innerHTML = userNotifications.length ? userNotifications.map(n => `
                    <div class="notification-item ${n.read ? '' : 'unread'}" onclick="App.markNotificationRead('${n.id}')">
                        <div class="notification-title">${n.title}</div>
                        <div class="notification-message">${n.message}</div>
                        <div class="notification-time">${this.formatDate(n.createdAt)}</div>
                    </div>
                `).join('') : '<div style="padding:24px;text-align:center;color:var(--text-secondary)">No notifications</div>';
            },

            updateNotificationCount() {
                const count = this.notifications.filter(n => n.userId === this.currentUser.id && !n.read).length;
                document.getElementById('notificationCount').textContent = count;
                document.getElementById('notificationCount').style.display = count ? 'flex' : 'none';
            },

            markNotificationRead(id) {
                const n = this.notifications.find(n => n.id === id);
                if (n) n.read = true;
                this.saveData();
                this.updateNotificationCount();
                this.renderNotifications();
            },

            markAllNotificationsRead() {
                this.notifications.filter(n => n.userId === this.currentUser.id).forEach(n => n.read = true);
                this.saveData();
                this.updateNotificationCount();
                this.renderNotifications();
                this.showToast('All notifications marked as read', 'success');
            },

            // Settings
            saveProfile() {
                const name = document.getElementById('settingsName').value.trim();
                if (!name) { this.showToast('Name is required', 'error'); return; }
                this.currentUser.name = name;
                const idx = this.users.findIndex(u => u.id === this.currentUser.id);
                if (idx !== -1) this.users[idx] = this.currentUser;
                this.saveData();
                this.updateUserUI();
                this.showToast('Profile saved', 'success');
            },

            addCategory() {
                const input = document.getElementById('newCategory');
                const val = input.value.trim();
                if (!val || this.categories.includes(val)) { this.showToast('Invalid category', 'error'); return; }
                this.categories.push(val);
                this.saveData();
                this.navigate('settings');
                this.showToast('Category added', 'success');
            },

            deleteCategory(index) {
                this.categories.splice(index, 1);
                this.saveData();
                this.navigate('settings');
            },

            exportData() {
                const data = { users: this.users, tickets: this.tickets, comments: this.comments, categories: this.categories, priorities: this.priorities };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'ticketflow-export.json'; a.click();
                URL.revokeObjectURL(url);
                this.showToast('Data exported', 'success');
            },

            importData() { document.getElementById('importFile').click(); },

            handleImport(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.users) this.users = data.users;
                        if (data.tickets) this.tickets = data.tickets;
                        if (data.comments) this.comments = data.comments;
                        if (data.categories) this.categories = data.categories;
                        this.saveData();
                        this.showToast('Data imported successfully', 'success');
                        this.navigate('settings');
                    } catch { this.showToast('Invalid file', 'error'); }
                };
                reader.readAsText(file);
            },

            // Utilities
            addActivity(ticketId, action, details) {
                this.activity.push({ id: 'a' + Date.now(), ticketId, userId: this.currentUser.id, action, details, createdAt: new Date().toISOString() });
            },

            filterTickets(query) {
                const rows = document.querySelectorAll('#ticketsTableBody tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
                });
            },

            filterTicketsByStatus(status) {
                const rows = document.querySelectorAll('#ticketsTableBody tr');
                rows.forEach(row => {
                    if (!status) { row.style.display = ''; return; }
                    const badge = row.querySelector('.badge');
                    row.style.display = badge?.classList.contains('badge-' + status) ? '' : 'none';
                });
            },

            formatDate(dateStr) {
                const d = new Date(dateStr);
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            },

            showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
